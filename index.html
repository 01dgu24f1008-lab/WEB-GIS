<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <script src="https://cdn.tailwindcss.com"></script>
        
        <link rel="stylesheet" href="./resources/ol.css">
        <link rel="stylesheet" href="resources/fontawesome-all.min.css">
        <link rel="stylesheet" href="./resources/qgis2web.css">
        
        <style>
            html, body { height: 100%; margin: 0; padding: 0; background-color: #ffffff; overflow: hidden; }
            #map { width: 100%; height: 100%; }
            .bg-navbar { background-color: #2d5a27; } 
            .bg-sidebar { background-color: #1e212d; }
            .bg-card { background-color: #111319; }
            .text-accent { color: #4ade80; }
            .ol-popup { background-color: white; padding: 15px; border-radius: 10px; border: 1px solid #cccccc; bottom: 12px; left: -50px; min-width: 180px; }
        </style>
        <title>SIMPLY STAY - Land Explorer</title>
    </head>
    <body class="flex flex-col">

        <nav class="h-[60px] bg-navbar flex items-center justify-center shadow-lg z-[2000] shrink-0">
            <h1 class="text-white text-xl font-serif italic tracking-tight uppercase">simply stay</h1>
        </nav>

        <div class="flex flex-1 overflow-hidden relative">
            <div id="map" class="flex-1 z-0 relative"></div>

            <aside class="w-80 bg-sidebar h-full text-white p-5 shadow-2xl z-[1001] overflow-y-auto shrink-0 border-l border-gray-800">
                <input type="text" id="lotInput" placeholder="Masukkan No Lot" class="w-full bg-card border border-gray-700 rounded-md p-3 text-sm text-white mb-2">
                <button onclick="searchLot()" class="w-full bg-green-700 hover:bg-green-600 py-2.5 rounded-md text-sm font-bold mb-2">Cari Lot</button>
                <button onclick="location.reload()" class="w-full bg-red-600 hover:bg-red-500 py-2.5 rounded-md text-sm font-bold">Reset Peta</button>
                
                <div class="mt-6 space-y-4">
                    <div class="bg-card border-l-4 border-green-500 p-4">
                        <p class="text-[9px] text-gray-400 font-bold uppercase">No Lot Dipilih</p>
                        <p class="text-accent text-lg font-bold" id="selectedLot">-</p>
                    </div>
                </div>
            </aside>
        </div>

        <script src="./resources/ol.js"></script>
        <script src="layers/LOTFINAL_2.js"></script> 
        <script src="./layers/layers.js"></script>
        <script src="./resources/qgis2web.js"></script>

        <script>
            // 1. Tambah Google Satellite
            var lyr_GoogleSatellite = new ol.layer.Tile({
                title: 'Google Satellite',
                type: 'base',
                visible: true,
                source: new ol.source.XYZ({
                    url: 'https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}'
                })
            });
            map.addLayer(lyr_GoogleSatellite);

            // 2. Definisi Gaya Highlight
            var highlightStyle = new ol.style.Style({
                fill: new ol.style.Fill({ color: 'rgba(255, 255, 0, 0.6)' }),
                stroke: new ol.style.Stroke({ color: '#ffcc33', width: 3 })
            });

            var selectedFeature = null;

            // 3. Fungsi Cari Lot & Zoom
            function searchLot() {
                var val = document.getElementById('lotInput').value.trim();
                if (!val) return;

                var found = false;
                // Pastikan 'lyr_LOTFINAL_2' sesuai dengan fail layers.js anda
                var source = lyr_LOTFINAL_2.getSource(); 
                
                source.getFeatures().forEach(function(feature) {
                    // Semak atribut ini dengan fail .js anda (contoh: NO_LOT atau no_lot)
                    var lotNo = feature.get('NO_LOT') || feature.get('no_lot');
                    
                    if (lotNo && lotNo.toString() === val) {
                        found = true;
                        if (selectedFeature) selectedFeature.setStyle(undefined);
                        
                        feature.setStyle(highlightStyle);
                        selectedFeature = feature;
                        
                        document.getElementById('selectedLot').innerText = lotNo;
                        
                        // Zoom ke koordinat lot
                        var extent = feature.getGeometry().getExtent();
                        map.getView().fit(extent, { duration: 1000, padding: [50, 50, 50, 50] });
                    }
                });

                if (!found) alert("Lot " + val + " tidak dijumpai.");
            }
        </script>
    </body>
</html>
