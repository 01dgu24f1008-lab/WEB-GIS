<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web-GIS Land Explorer</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        #map { height: 100vh; width: 100%; }
        /* Warna Custom mengikut gambar anda */
        .bg-sidebar { background-color: #1e212d; }
        .bg-card { background-color: #111319; }
        .text-accent { color: #4ade80; }
    </style>
</head>
<body class="flex overflow-hidden">

    <aside class="w-80 bg-sidebar h-screen text-white p-4 shadow-2xl z-[1001] overflow-y-auto flex-shrink-0">
        
        <div class="flex items-center justify-between mb-6 text-gray-400">
            <h2 class="text-sm font-semibold flex items-center gap-2 uppercase tracking-widest">
                ⚙️ Tetapan Paparan
            </h2>
            <button class="hover:text-white">«</button>
        </div>

        <div class="flex items-center gap-2 mb-6">
            <span class="text-2xl">🌍</span>
            <h1 class="text-xl font-bold italic">Land Explorer</h1>
        </div>

        <div class="space-y-3 mb-8">
            <input type="text" id="lotInput" placeholder="Masukkan No Lot" 
                class="w-full bg-card border border-gray-700 rounded-lg p-3 text-white focus:ring-2 focus:ring-green-500 outline-none">
            
            <button onclick="searchLot()" class="w-full bg-green-700 hover:bg-green-600 py-3 rounded-lg font-bold transition">
                Cari Lot
            </button>
            
            <button onclick="resetMap()" class="w-full bg-red-700 hover:bg-red-600 py-2 rounded-lg text-sm transition font-medium">
                Reset Peta
            </button>
            
            <button class="w-full bg-sky-600 hover:bg-sky-500 py-2 rounded-lg text-sm transition font-medium">
                📄 Export Detail + Map (PDF)
            </button>
        </div>

        <div class="space-y-4">
            <div class="bg-card border-l-4 border-green-500 p-3 rounded-r-lg">
                <p class="text-[10px] text-gray-500 font-bold uppercase">Total Lot</p>
                <p class="text-accent text-xl font-bold" id="totalLot">67</p>
            </div>

            <div class="bg-card border-l-4 border-green-500 p-3 rounded-r-lg">
                <p class="text-[10px] text-gray-500 font-bold uppercase">No Lot Dipilih</p>
                <p class="text-accent text-xl font-bold" id="selectedLot">-</p>
            </div>

            <div class="bg-card border-l-4 border-green-500 p-3 rounded-r-lg">
                <p class="text-[10px] text-gray-500 font-bold uppercase">Nama Pemilik</p>
                <p class="text-accent text-lg font-bold uppercase" id="ownerName">-</p>
            </div>

            <div class="bg-card border-l-4 border-green-500 p-3 rounded-r-lg">
                <p class="text-[10px] text-gray-500 font-bold uppercase">Luas Lot</p>
                <p class="text-accent text-xl font-bold" id="lotArea">0 m²</p>
            </div>
        </div>
    </aside>

    <main class="flex-grow relative">
        <div id="map"></div>
    </main>

    <script>
        // 1. Initialize Map
        // Koordinat contoh (Kuala Lumpur)
        const map = L.map('map').setView([3.1390, 101.6869], 13);

        // 2. Add Tile Layer (Basemap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // 3. Fungsi Cari Lot (Contoh Simulasi)
        function searchLot() {
            const lotNo = document.getElementById('lotInput').value;
            
            if(lotNo === "") {
                alert("Sila masukkan No Lot");
                return;
            }

            // Simulasi kemas kini data di Sidebar
            document.getElementById('selectedLot').innerText = lotNo;
            document.getElementById('ownerName').innerText = "Ali Bin Abu";
            document.getElementById('lotArea').innerText = "106.825 m²";

            // Tambah marker sebagai contoh
            const center = map.getCenter();
            L.marker(center).addTo(map)
                .bindPopup('Lot ' + lotNo)
                .openPopup();
        }

        // 4. Fungsi Reset
        function resetMap() {
            document.getElementById('lotInput').value = "";
            document.getElementById('selectedLot').innerText = "-";
            document.getElementById('ownerName').innerText = "-";
            document.getElementById('lotArea').innerText = "0 m²";
            map.setView([3.1390, 101.6869], 13);
        }
    </script>
</body>
</html>
